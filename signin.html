<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyKolong2 Hub - Sign In</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.js"></script>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/auth.css">
</head>

<body class="auth-body">
    <div class="page-container">
        <header class="page-header">
            <div class="logo-box">
                <i data-lucide="home" class="logo-icon"></i>
            </div>
            <h1>MyKolong2 Hub</h1>
            <p>Sign in to your account</p>
        </header>

        <main class="card">
            <div class="card-header">
                <div class="card-title">
                    <i data-lucide="log-in" class="title-icon"></i>
                    <h2>Sign In</h2>
                </div>
                <p class="card-subtitle">Welcome back to the MyKolong2 Hub community</p>
            </div>

            <form class="signup-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <div class="input-wrapper">
                        <i data-lucide="mail" class="input-icon"></i>
                        <input type="email" id="email" placeholder="you@example.com">
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <i data-lucide="lock" class="input-icon"></i>
                        <input type="password" id="password" placeholder="Enter your password">
                        <button type="button" class="eye-btn" aria-label="Toggle password visibility">
                            <i data-lucide="eye" class="eye-icon icon-show"></i>
                            <i data-lucide="eye-off" class="eye-icon icon-hide" style="display: none;"></i>
                        </button>
                    </div>
                </div>

                <div class="form-actions-row">
                    <label class="checkbox-container">
                        <input type="checkbox" id="rememberMe">
                        <span class="checkmark"></span>
                        Remember me
                    </label>
                    <a href="forgot-password.html" class="forgot-link">Forgot password?</a>
                </div>

                <button type="submit" class="btn btn-primary">Sign In</button>

                <div class="divider">
                    <span>Don't have an account?</span>
                </div>

                <a href="index.html" class="btn btn-outline" style="text-decoration: none;">Create Account</a>
            </form>
        </main>

        <footer class="page-footer">
            <p>&copy; 2026 MyKolong2 Hub. All rights reserved.</p>
        </footer>
    </div>

    <script type="module">
        import { signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js";
        import { auth } from "./js/firebase-config.js";
        import { redirectIfLoggedIn } from "./js/auth.js";

        // Initialize Lucide icons safely
        if (typeof lucide !== 'undefined') {
            lucide.createIcons();
        } else {
            console.warn("Lucide icons failed to load. Proceeding without icons.");
        }

        // If already logged in, go to dashboard
        redirectIfLoggedIn();

        // Setup password toggles
        document.querySelectorAll('.eye-btn').forEach(btn => {
            btn.addEventListener('click', function () {
                const wrapper = this.closest('.input-wrapper');
                const input = wrapper.querySelector('input');
                const iconShow = this.querySelector('.icon-show');
                const iconHide = this.querySelector('.icon-hide');

                if (input.type === 'password') {
                    input.type = 'text';
                    if(iconShow) iconShow.style.display = 'none';
                    if(iconHide) iconHide.style.display = 'block';
                } else {
                    input.type = 'password';
                    if(iconShow) iconShow.style.display = 'block';
                    if(iconHide) iconHide.style.display = 'none';
                }
            });
        });

        // Sign In Form Handler
        const form = document.querySelector('.signup-form');
        const submitBtn = form.querySelector('button[type="submit"]');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            // Remove any previous error
            const prevError = form.querySelector('.form-error');
            if (prevError) prevError.remove();

            // Validation
            if (!email || !password) {
                showError('Please enter your email and password.');
                return;
            }

            // Disable button during submission
            submitBtn.disabled = true;
            submitBtn.textContent = 'Signing In...';

            try {
                await signInWithEmailAndPassword(auth, email, password);
                // Redirect to dashboard on success
                window.location.href = "dashboard.html";

            } catch (error) {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Sign In';

                const errorMessages = {
                    'auth/user-not-found': 'No account found with this email.',
                    'auth/wrong-password': 'Incorrect password. Please try again.',
                    'auth/invalid-email': 'Please enter a valid email address.',
                    'auth/invalid-credential': 'Invalid email or password. Please try again.',
                    'auth/too-many-requests': 'Too many failed attempts. Please try again later.',
                };

                showError(errorMessages[error.code] || 'Sign in failed. Please try again.');
            }
        });

        function showError(message) {
            const prevError = form.querySelector('.form-error');
            if (prevError) prevError.remove();

            const errorEl = document.createElement('div');
            errorEl.className = 'form-error';
            errorEl.style.cssText = 'background: #fee2e2; color: #dc2626; padding: 0.75rem 1rem; border-radius: 8px; font-size: 0.85rem; margin-bottom: 1rem; text-align: center;';
            errorEl.textContent = message;
            form.insertBefore(errorEl, submitBtn);
        }
    </script>
</body>

</html>
