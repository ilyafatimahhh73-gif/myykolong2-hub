<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyKolong2 Hub - Forgot Password</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.js"></script>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/auth.css">
</head>

<body class="auth-body">
    <div class="page-container">
        <header class="page-header">
            <div class="logo-box">
                <i data-lucide="home" class="logo-icon"></i>
            </div>
            <h1>MyKolong2 Hub</h1>
            <p>Reset your password</p>
        </header>

        <main class="card">
            <div class="card-header">
                <div class="card-title">
                    <i data-lucide="key-round" class="title-icon"></i>
                    <h2>Forgot Password</h2>
                </div>
                <p class="card-subtitle">Enter your email address and we'll send you a link to reset your password.</p>
            </div>

            <form class="signup-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <div class="input-wrapper">
                        <i data-lucide="mail" class="input-icon"></i>
                        <input type="email" id="email" placeholder="you@example.com">
                    </div>
                </div>

                <button type="submit" class="btn btn-primary">Send Reset Link</button>

                <div class="divider">
                    <span>Remember your password?</span>
                </div>

                <a href="signin.html" class="btn btn-outline" style="text-decoration: none;">Back to Sign In</a>
            </form>
        </main>

        <footer class="page-footer">
            <p>&copy; 2026 MyKolong2 Hub. All rights reserved.</p>
        </footer>
    </div>

    <script type="module">
        import { sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js";
        import { auth } from "./js/firebase-config.js";
        import { redirectIfLoggedIn } from "./js/auth.js";

        // Initialize Lucide icons safely
        if (typeof lucide !== 'undefined') {
            lucide.createIcons();
        } else {
            console.warn("Lucide icons failed to load. Proceeding without icons.");
        }

        // If already logged in, go to dashboard
        redirectIfLoggedIn();

        // Forgot Password Form Handler
        const form = document.querySelector('.signup-form');
        const submitBtn = form.querySelector('button[type="submit"]');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value.trim();

            // Remove any previous error/success messages
            const prevMsg = form.querySelector('.form-msg');
            if (prevMsg) prevMsg.remove();

            // Validation
            if (!email) {
                showMessage('Please enter your email address.', 'error');
                return;
            }

            // Disable button during submission
            submitBtn.disabled = true;
            submitBtn.textContent = 'Sending...';

            try {
                await sendPasswordResetEmail(auth, email);
                submitBtn.textContent = 'Link Sent!';
                showMessage('Password reset link sent! Check your email inbox.', 'success');

                // Clear the input
                document.getElementById('email').value = '';

                // Optionally enable it back after some time
                setTimeout(() => {
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Send Reset Link';
                }, 5000);

            } catch (error) {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Send Reset Link';

                const errorMessages = {
                    'auth/user-not-found': 'No account found with this email.',
                    'auth/invalid-email': 'Please enter a valid email address.',
                };

                showMessage(errorMessages[error.code] || 'Failed to send reset link. Please try again.', 'error');
            }
        });

        function showMessage(message, type) {
            const prevMsg = form.querySelector('.form-msg');
            if (prevMsg) prevMsg.remove();

            const msgEl = document.createElement('div');
            msgEl.className = 'form-msg';

            if (type === 'error') {
                msgEl.style.cssText = 'background: #fee2e2; color: #dc2626; padding: 0.75rem 1rem; border-radius: 8px; font-size: 0.85rem; margin-bottom: 1rem; text-align: center;';
            } else {
                msgEl.style.cssText = 'background: #dcfce7; color: #166534; padding: 0.75rem 1rem; border-radius: 8px; font-size: 0.85rem; margin-bottom: 1rem; text-align: center;';
            }

            msgEl.textContent = message;
            form.insertBefore(msgEl, submitBtn);
        }
    </script>
</body>

</html>
